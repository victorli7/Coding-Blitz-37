<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feature Flags API Playground</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      line-height: 1.5;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1rem 3rem;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    .subtitle { color: #94a3b8; margin: 0 0 2rem; font-size: 0.95rem; }
    section {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    h2 { margin: 0 0 0.75rem; font-size: 1rem; color: #cbd5e1; }
    p { margin: 0 0 0.75rem; font-size: 0.9rem; color: #94a3b8; }
    label { display: block; font-size: 0.85rem; margin-bottom: 0.35rem; }
    input, select {
      width: 100%;
      padding: 0.5rem 0.6rem;
      border-radius: 6px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      margin-bottom: 0.75rem;
      font-size: 0.9rem;
    }
    .row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    button {
      padding: 0.45rem 0.85rem;
      border-radius: 6px;
      border: none;
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
    }
    button.method-get { background: #16a34a; }
    button.method-get:hover { background: #15803d; }
    button.method-post { background: #3b82f6; }
    button.method-post:hover { background: #2563eb; }
    button.method-delete { background: #dc2626; }
    button.method-delete:hover { background: #b91c1c; }
    pre {
      margin: 1rem 0 0;
      padding: 1rem;
      background: #020617;
      border: 1px solid #334155;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 0.8rem;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 4rem;
    }
    code { font-family: ui-monospace, monospace; }
    .enabled-true { color: #4ade80; font-weight: 600; }
    .enabled-false { color: #f87171; font-weight: 600; }
  </style>
</head>
<body>
  <main>
    <h1>Feature Flags API Playground</h1>
    <p class="subtitle">Try the REST API from the browser. Responses appear below.</p>

    <section>
      <h2>1. Create <code>dark_mode</code></h2>
      <p>Region segments: <code>us-east</code> off, <code>us-west</code> on. Others default off.</p>
      <div class="row">
        <button type="button" class="method-post" id="btn-create">POST /flags</button>
        <button type="button" class="method-get" id="btn-list">GET /flags</button>
        <button type="button" class="method-delete" id="btn-delete">DELETE /flags/dark_mode</button>
      </div>
    </section>

    <section>
      <h2>2. Evaluate <code>dark_mode</code></h2>
      <label for="user-id">user_id</label>
      <input id="user-id" type="text" value="u-1" />
      <label for="region">region</label>
      <select id="region">
        <option value="us-west">us-west (on)</option>
        <option value="us-east">us-east (off)</option>
        <option value="eu-central">eu-central (default off)</option>
      </select>
      <label for="rollout-percent">Percentage rollout</label>
      <div class="row">
        <input id="rollout-percent" type="range" min="0" max="100" value="25" style="flex:1" />
        <input id="rollout-num" type="number" min="0" max="100" value="25" style="width:96px" />
      </div>
      <p style="margin-top:0.25rem;font-size:0.85rem;color:#94a3b8">Local check: bucket <span id="rollout-bucket">—</span> → <strong id="rollout-local-result">—</strong></p>
      <button type="button" class="method-get" id="btn-evaluate">GET /flags/dark_mode/evaluate</button>
    </section>

    <section>
      <h2>3. Health</h2>
      <button type="button" class="method-get" id="btn-health">GET /health</button>
    </section>

    <pre id="output"><code>Click a button to send a request…</code></pre>
  </main>

  <script>
    const output = document.getElementById("output");
    const darkModePayload = {
      name: "dark_mode",
      default_state: false,
      segment_key: "region",
      segments: { "us-east": false, "us-west": true },
    };

    // --- crypto helpers (browser) ---
    async function sha256Hex(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function bucketFromHex(hex) {
      return parseInt(hex.slice(0, 8), 16) % 100;
    }

    async function getBucket(userId) {
      if (!userId) return null;
      const hex = await sha256Hex(String(userId));
      return bucketFromHex(hex);
    }

    async function computeLocalRollout(userId) {
      const bucket = await getBucket(userId);
      const percent = Number(document.getElementById('rollout-num').value || 0);
      const inRollout = bucket !== null && bucket < percent;
      return { bucket, percent, inRollout };
    }

    async function updateRolloutDisplay() {
      const userId = document.getElementById('user-id').value;
      const info = await computeLocalRollout(userId);
      document.getElementById('rollout-bucket').textContent = info.bucket === null ? '—' : info.bucket;
      document.getElementById('rollout-local-result').textContent = info.inRollout ? `in rollout (${info.percent}%)` : `not in rollout (${info.percent}%)`;
    }

    // --- API call + display (accepts optional localInfo) ---
    async function callApi(method, path, body, localInfo) {
      const options = { method, headers: {} };
      if (body !== undefined) {
        options.headers["Content-Type"] = "application/json";
        options.body = JSON.stringify(body);
      }

      const started = performance.now();
      let response;
      let text;
      try {
        response = await fetch(path, options);
        text = await response.text();
      } catch (err) {
        showResult(method, path, body, null, String(err), performance.now() - started, localInfo);
        return;
      }

      let parsed;
      try {
        parsed = text ? JSON.parse(text) : null;
      } catch {
        parsed = text;
      }

      showResult(method, path, body, response.status, parsed, performance.now() - started, localInfo);
    }

    function showResult(method, path, body, status, data, ms, localInfo) {
      const lines = [
        `${method} ${path}${status !== null ? ` → ${status}` : ""} (${ms.toFixed(0)}ms)`,
      ];
      if (body !== undefined) {
        lines.push("", "Request:", JSON.stringify(body, null, 2));
      }
      lines.push("", "Response:", typeof data === "string" ? data : JSON.stringify(data, null, 2));

      if (localInfo) {
        lines.push('', 'Local rollout check:', JSON.stringify(localInfo, null, 2));
      }

      if (data && typeof data === "object" && "enabled" in data) {
        const cls = data.enabled ? "enabled-true" : "enabled-false";
        lines.push("", `→ enabled: ${data.enabled} (${data.source})`);
        let html = `<code>${escapeHtml(lines.join("\n"))}\n\n<span class="${cls}">enabled: ${data.enabled}</span>  source: ${data.source}</code>`;
        if (localInfo) {
          const localCls = localInfo.inRollout ? 'enabled-true' : 'enabled-false';
          html += `\n\n<code>Local: <span class="${localCls}">${localInfo.inRollout}</span> bucket=${localInfo.bucket} percent=${localInfo.percent}</code>`;
        }
        output.innerHTML = html;
        return;
      }

      output.innerHTML = `<code>${escapeHtml(lines.join("\n"))}</code>`;
    }

    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    // --- wire up buttons and inputs ---
    document.getElementById("btn-create").addEventListener("click", () => {
      callApi("POST", "/flags", darkModePayload);
    });
    document.getElementById("btn-list").addEventListener("click", () => {
      callApi("GET", "/flags");
    });
    document.getElementById("btn-delete").addEventListener("click", () => {
      callApi("DELETE", "/flags/dark_mode");
    });
    document.getElementById("btn-evaluate").addEventListener("click", async () => {
      const userId = document.getElementById("user-id").value;
      const params = new URLSearchParams({
        user_id: userId,
        region: document.getElementById("region").value,
      });
      const localInfo = await computeLocalRollout(userId);
      callApi("GET", `/flags/dark_mode/evaluate?${params}`, undefined, localInfo);
    });
    document.getElementById("btn-health").addEventListener("click", () => {
      callApi("GET", "/health");
    });

    // Range / number sync + initial update
    const range = document.getElementById('rollout-percent');
    const num = document.getElementById('rollout-num');
    range.addEventListener('input', () => { num.value = range.value; updateRolloutDisplay(); });
    num.addEventListener('input', () => { range.value = num.value; updateRolloutDisplay(); });
    document.getElementById('user-id').addEventListener('input', updateRolloutDisplay);
    // initial render
    updateRolloutDisplay();
  </script>
</body>
</html>
