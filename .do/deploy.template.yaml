spec:
  name: coding-blitz-37
  databases:
    - name: db
      engine: PG
      version: "16"
  services:
    - name: web
      git:
        branch: main
        repo_clone_url: https://github.com/victorli7/Coding-Blitz-37.git
      http_port: 8080
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-0.5gb
      envs:
        - key: DATABASE_URL
          scope: RUN_TIME
          value: ${db.DATABASE_URL}
  ingress:
    rules:
      - component:
          name: web
        match:
          path:
            prefix: /
